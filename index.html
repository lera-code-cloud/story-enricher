<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Enricher</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #e8e0d8;
    min-height: 100vh;
    background-color: #121212;
  }
  header { background: rgba(26,26,26,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 0.5px solid #2e2e2e; padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo { width: 44px; height: 44px; background: #e8e0d8; border-radius: 11px; display: flex; align-items: center; justify-content: center; }
  .logo span { font-family: 'Playfair Display', serif; font-size: 20px; font-style: italic; color: #1a1a1a; letter-spacing: 0.02em; }
  header h1 { font-size: 15px; font-weight: 500; color: #e8e0d8; letter-spacing: .02em; }
  header span { font-size: 13px; color: #6b6560; }
  .settings-btn { background: none; border: 0.5px solid #2e2e2e; border-radius: 8px; padding: 7px 16px; font-size: 12px; font-family: inherit; color: #6b6560; cursor: pointer; letter-spacing: .04em; transition: border-color .2s, color .2s; }
  .settings-btn:hover { border-color: #c8b89a; color: #e8e0d8; }
  .settings-btn.active { border-color: #c8b89a; color: #c8b89a; }
  .container { max-width: 820px; margin: 48px auto; padding: 0 28px; }
  .prompt-editor { display: none; background: #1a1a1a; border: 0.5px solid #2e2e2e; border-radius: 16px; padding: 28px 32px; margin-bottom: 24px; }
  .prompt-editor.open { display: block; }
  .editor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .editor-header label { font-size: 11px; font-weight: 500; color: #6b6560; text-transform: uppercase; letter-spacing: .08em; }
  .editor-actions { display: flex; gap: 8px; }
  .pill-btn { background: none; border: 0.5px solid #2e2e2e; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-family: inherit; color: #9a8f85; cursor: pointer; transition: all .2s; }
  .pill-btn:hover { border-color: #c8b89a; color: #e8e0d8; }
  .pill-btn.save { background: #e8e0d8; color: #121212; border-color: #e8e0d8; }
  .pill-btn.save:hover { background: #fff; border-color: #fff; color: #121212; }
  #promptEditor { width: 100%; background: #111; border: 0.5px solid #2e2e2e; border-radius: 10px; padding: 16px; font-size: 13px; font-family: "SF Mono", "Fira Code", monospace; color: #c8b89a; resize: vertical; min-height: 260px; outline: none; transition: border-color .2s; line-height: 1.6; }
  #promptEditor:focus { border-color: #c8b89a; }
  .saved-badge { font-size: 12px; color: #6b9a7a; opacity: 0; transition: opacity .3s; margin-left: 8px; }
  .saved-badge.show { opacity: 1; }
  .input-card { background: transparent; border: 0.5px solid rgba(200,184,154,0.2); border-radius: 16px; padding: 28px 32px; margin-bottom: 24px; }
  .input-card label { display: block; font-size: 11px; font-weight: 500; color: #6b6560; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
  textarea#inputText { width: 100%; background: rgba(18,18,18,0.25); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); border: 0.5px solid rgba(200,184,154,0.25); border-radius: 10px; padding: 16px; font-size: 15px; font-family: inherit; color: #e8e0d8; resize: vertical; min-height: 140px; outline: none; transition: border-color .2s; line-height: 1.6; }
  textarea#inputText::placeholder { color: #4a4540; }
  textarea#inputText:focus { border-color: rgba(200,184,154,0.6); background: rgba(18,18,18,0.45); }
  .btn-row { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  button#submitBtn { background: #e8e0d8; color: #121212; border: none; border-radius: 10px; padding: 13px 28px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .2s, opacity .2s; letter-spacing: .01em; }
  button#submitBtn:hover { background: #fff; }
  button#submitBtn:disabled { opacity: .35; cursor: not-allowed; }
  #status { font-size: 13px; color: #6b6560; }
  .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #c8b89a; margin: 0 2px; animation: pulse .9s infinite alternate; }
  .dot:nth-child(2) { animation-delay: .3s; }
  .dot:nth-child(3) { animation-delay: .6s; }
  @keyframes pulse { from { opacity: .2; } to { opacity: 1; } }
  #output { display: none; }
  .result-card { background: #1a1a1a; border: 0.5px solid #2e2e2e; border-radius: 16px; padding: 36px 40px; }
  .result-toolbar { display: flex; justify-content: flex-end; margin-bottom: 24px; gap: 10px; }
  .tool-btn { background: none; border: 0.5px solid #2e2e2e; border-radius: 8px; padding: 7px 16px; font-size: 12px; font-family: inherit; color: #9a8f85; cursor: pointer; transition: border-color .2s, color .2s; letter-spacing: .02em; }
  .tool-btn:hover { border-color: #c8b89a; color: #e8e0d8; }
  .result-body { font-size: 15px; line-height: 1.8; color: #d4ccc4; }
  .result-body .block { margin-bottom: 28px; }
  .result-body .block-title { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: #6b6560; font-weight: 500; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 0.5px solid #2e2e2e; }
  .result-body p { margin-bottom: 10px; }
  .result-body strong { color: #e8e0d8; font-weight: 500; }
  .result-body a { color: #c8b89a; text-decoration: none; border-bottom: 0.5px solid #c8b89a44; transition: border-color .2s; }
  .result-body a:hover { border-color: #c8b89a; }
  .result-body em { color: #9a8f85; font-style: normal; }
  #searchLog { font-size: 12px; color: #6b6560; margin-top: 6px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo"><span>SE</span></div>
    <h1>story enricher</h1>
    <span>/ digital media</span>
  </div>
  <button class="settings-btn" id="settingsToggle" onclick="toggleEditor()">Prompt editor</button>
</header>

<div class="container">

  <div class="prompt-editor" id="promptEditor-wrap">
    <div class="editor-header">
      <label>System prompt <span class="saved-badge" id="savedBadge">Saved</span></label>
      <div class="editor-actions">
        <button class="pill-btn" onclick="resetPrompt()">Reset to default</button>
        <button class="pill-btn save" onclick="savePrompt()">Save</button>
      </div>
    </div>
    <textarea id="promptEditor"></textarea>
  </div>

  <div class="input-card">
    <label>Input — article, URL, or photo links</label>
    <textarea id="inputText" placeholder="Paste article text, a short description, a URL, or a list of photo links…"></textarea>
    <div class="btn-row">
      <button id="submitBtn" onclick="runResearch()">Generate</button>
      <div id="status"></div>
    </div>
    <div id="searchLog"></div>
  </div>

  <div id="output">
    <div class="result-card">
      <div class="result-toolbar">
        <button class="tool-btn" onclick="copyResult()">Copy</button>
        <button class="tool-btn" onclick="resetTool()">New</button>
      </div>
      <div class="result-body" id="resultContent"></div>
    </div>
  </div>

</div>

<script>
// ---------------------------------------------------------------------------
// Approved outlet domains — web_search is hard-restricted to this list via
// the API's allowed_domains parameter. Claude cannot see or cite anything
// outside these domains.
// ---------------------------------------------------------------------------
const APPROVED_DOMAINS = [
  // Legal & primary records
  "pacer.uscourts.gov","courtlistener.com","justia.com","unicourt.com","judyrecords.com",
  "lawandcrime.com","courttv.com","themarshallproject.org","oxygen.com","investigationdiscovery.com",
  // Podcasts / interviews
  "podcasts.apple.com","open.spotify.com","imdb.com",
  // National wire & major news
  "reuters.com","nytimes.com","washingtonpost.com","wsj.com","usatoday.com","npr.org","pbs.org",
  "cnn.com","nbcnews.com","abcnews.go.com","cbsnews.com","foxnews.com","bbc.com","theguardian.com",
  "independent.co.uk","newsweek.com","time.com","politico.com","axios.com","thehill.com",
  "latimes.com","chicagotribune.com","forbes.com","cnbc.com",
  // Entertainment trade publications
  "hollywoodreporter.com","variety.com","deadline.com","thewrap.com","indiewire.com","billboard.com","wwd.com",
  // Celebrity/entertainment news
  "people.com","usmagazine.com","etonline.com","eonline.com","tmz.com","extratv.com",
  "accesshollywood.com","parade.com","yahoo.com","vanityfair.com","vulture.com","nymag.com",
  "ew.com","businessinsider.com","thedailybeast.com","buzzfeednews.com","vice.com",
  // Tabloid / gossip
  "dailymail.co.uk","pagesix.com","nypost.com","closerweekly.com","theblast.com","hollywoodlife.com",
  // UK / international tabloid
  "thesun.co.uk","the-sun.com","mirror.co.uk","metro.co.uk","heatworld.com","graziadaily.co.uk",
  // Fashion & lifestyle glossies
  "vogue.com","gq.com","esquire.com","marieclaire.com","elle.com","harpersbazaar.com","instyle.com",
  "glamour.com","cosmopolitan.com","allure.com","interviewmagazine.com","rollingstone.com",
  "wmagazine.com","townandcountrymag.com","thecut.com","popsugar.com","refinery29.com",
  "essence.com","bustle.com","theface.com","i-d.co","highsnobiety.com","thedailyfrontrow.com",
  "complex.com","xxlmag.com","hiphopdx.com",
  // Local USA
  "ktla.com","abc7.com","nbclosangeles.com","foxla.com","ny1.com","abc7ny.com","nbcnewyork.com",
  "nydailynews.com","amny.com","chicago.suntimes.com","wgntv.com","miamiherald.com","wsvn.com",
  "sfchronicle.com","kron4.com","ajc.com","wsbtv.com","reviewjournal.com","houstonchronicle.com",
  "dallasnews.com","bostonglobe.com","inquirer.com","seattletimes.com","denverpost.com","espn.com","si.com",
  // Broadcast morning shows
  "today.com","goodmorningamerica.com",
  // British royal/celebrity glossies
  "hellomagazine.com","express.co.uk","dailystar.co.uk",
  // Background/verification tools
  "wikipedia.org","ancestry.com","findagrave.com","legacy.com","genius.com","boxofficemojo.com",
  // Photo/video verification & licensing
  "gettyimages.com","apimages.com","backgrid.com","shutterstock.com",
  // TV/soap/industry trade
  "tvline.com","soapoperadigest.com","tvguide.com",
  // Music trade
  "pitchfork.com","spin.com","nme.com",
  // State-level flagship outlets
  "al.com","adn.com","azcentral.com","arkansasonline.com","courant.com","delawareonline.com",
  "staradvertiser.com","idahostatesman.com","indystar.com","desmoinesregister.com","kansas.com",
  "courier-journal.com","nola.com","theadvocate.com","pressherald.com","baltimoresun.com",
  "freep.com","startribune.com","clarionledger.com","stltoday.com","billingsgazette.com",
  "omaha.com","unionleader.com","nj.com","abqjournal.com","timesunion.com","newsobserver.com",
  "bismarcktribune.com","cleveland.com","oklahoman.com","oregonlive.com","providencejournal.com",
  "postandcourier.com","argusleader.com","tennessean.com","sltrib.com","burlingtonfreepress.com",
  "richmond.com","wvgazettemail.com","jsonline.com","trib.com",
  // Official verified social accounts (primary source for direct quotes)
  "instagram.com","threads.net","x.com","twitter.com","tiktok.com","facebook.com","youtube.com"
];

const DEFAULT_PROMPT = `You are a research assistant for a digital media team. Your job is to suggest additional sources and ideas that can enrich a primary news article — not to summarize or repeat what the researcher already provided.
When a researcher gives you a news article (as text, a short description, or a URL), do NOT repeat, rephrase, or summarize the information from their input. Treat everything they shared as already known. Your only job is to suggest what is MISSING — new angles, external sources, additional context, and comparable cases they have not mentioned — so they can build a fuller article.
Respond with the following structure — always in English:
---
**📌 Story summary**
2–3 sentences capturing the core of the story.
---
**🔍 Background & related themes**
3–4 points covering broader context a reader needs to understand this story. Include relevant concepts, ongoing trends, or systemic issues connected to the topic.
---
**🔁 Similar cases & precedents**
3–4 real-world examples of similar situations — from recent news or history. For each, briefly explain what happened and why it's comparable to this story.
---
**🕰 Timeline**
4–6 chronological events showing how this situation developed. Start from the earliest relevant moment and lead up to the current story.
---
**💡 Storytelling angles**
2–3 ideas for how this story could be framed to make it more engaging — a human angle, an unexpected detail, a contrast, a question the audience is already asking.
---
**👗 Celebrity appearance & style intelligence** *(include only when the story involves a celebrity's looks, outfit, beauty, or body)*

Apply whichever of the following sub-sections are relevant to the story:

- **Style history & reactions** — Find past moments when this celebrity was praised or criticized for their style or appearance. Note any previous outfits, looks, or aesthetic choices that are comparable to the current story.

- **Plastic surgery & procedures** — If the topic involves physical changes, search for: (a) any statements the celebrity has made about cosmetic procedures, and (b) expert opinions (surgeons, dermatologists) on whether procedures appear to have been done. Cite sources for both.

- **Fashion details** — Identify the exact brand(s), designer(s), and specific model or collection of each piece the celebrity is actually wearing in this appearance (clothing, shoes, bag, jewelry, etc.). Look up the stylist credited for this look. Include real retail or resale prices for the specific items worn. Note whether each piece is from a current collection, a past season, or custom-made. Do not list generic brand associations — only what is directly tied to this specific outfit.

- **Who wore it / wore it similarly** — Search for other celebrities or public figures who previously appeared in the same or a visually similar outfit, makeup look, hairstyle, or accessories. Note any meaningful comparisons (same event type, same era, same designer).

- **Photo set analysis** *(use when the input is a list of photo URLs with no accompanying text)* — Analyze the visual content of the provided photos and identify: the occasion or context, key style elements, any notable details (jewelry, makeup, body language, setting), and interesting facts or comparisons that could serve as editorial captions or story hooks.

---
**📚 Approved sources only**
You have access to a web_search tool that is technically restricted to a fixed list of approved outlets (legal records, national wire services, entertainment trade press, tabloids, fashion glossies, local US outlets, state flagship papers, background/verification databases, photo agencies, and verified official social accounts). You cannot search or retrieve anything outside this list — it is enforced at the tool level.

- For every factual claim (dates, deaths, cases, quotes, statistics, style/fashion facts, comparisons), actually call web_search before stating it. Do not rely on memory alone for anything specific or checkable.
- If web_search returns nothing relevant for a claim, omit that claim entirely rather than fall back on unsearched knowledge.
- Every cited fact must use the real URL and outlet name returned by web_search. Never write out a URL or publication name from memory.
- If a URL is provided by the researcher as input, treat it only as context for what the story is about — still verify any new fact you add via web_search.

---
Rules:
- Always respond in English regardless of the language of the input.
- Be specific and factual. No vague filler.
- Keep each point concise — 1–2 sentences per item.
- Do not add commentary outside this structure.
- Every single fact, death, date, case, event, or statistic MUST have a source attached, in the format: Source: [Publication name](URL). If listing multiple people or events in one section, each item must have its own source on the same line.
- Never cite, invent, or imply an outlet that you did not actually retrieve via web_search. If no approved outlet covers a fact, omit that fact entirely rather than substitute an unlisted source or fabricate one.
- Never ask clarifying questions. Always respond immediately with the full structure.
- If the news is recent and beyond your training knowledge, use web_search to find what the approved outlets have published about it. Never refuse or ask for more information.
- The Celebrity appearance & style intelligence section is optional and should only appear when the story is clearly about a celebrity's looks, outfit, styling, beauty routine, body, or cosmetic procedures. Skip it entirely for political, business, or non-appearance-related stories.
- Within the Celebrity appearance & style intelligence section, include only the sub-sections that are directly relevant. Do not force sub-sections that don't apply to the story.`;

let currentPrompt = localStorage.getItem('storyEnricherPrompt') || DEFAULT_PROMPT;
document.getElementById('promptEditor').value = currentPrompt;

function toggleEditor() {
  const wrap = document.getElementById('promptEditor-wrap');
  const btn = document.getElementById('settingsToggle');
  const isOpen = wrap.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
}

function savePrompt() {
  currentPrompt = document.getElementById('promptEditor').value;
  localStorage.setItem('storyEnricherPrompt', currentPrompt);
  const badge = document.getElementById('savedBadge');
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 2000);
}

function resetPrompt() {
  document.getElementById('promptEditor').value = DEFAULT_PROMPT;
  currentPrompt = DEFAULT_PROMPT;
  localStorage.setItem('storyEnricherPrompt', DEFAULT_PROMPT);
  const badge = document.getElementById('savedBadge');
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 2000);
}

// Pull real citation URLs out of the API response so the UI can show a
// verified sources list independent of whatever the model wrote inline.
function extractCitations(content) {
  const seen = new Map();
  (content || []).forEach(block => {
    if (block.type === "text" && Array.isArray(block.citations)) {
      block.citations.forEach(c => {
        if (c.url && !seen.has(c.url)) {
          seen.set(c.url, c.title || c.url);
        }
      });
    }
  });
  return [...seen.entries()];
}

// Count how many actual searches were run, for a small transparency line.
function countSearches(content) {
  return (content || []).filter(b => b.type === "server_tool_use" && b.name === "web_search").length;
}

async function runResearch() {
  const input = document.getElementById('inputText').value.trim();
  if (!input) return;

  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('status');
  const output = document.getElementById('output');
  const searchLog = document.getElementById('searchLog');

  btn.disabled = true;
  output.style.display = 'none';
  searchLog.textContent = '';
  status.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-opus-4-6",
        max_tokens: 4000,
        system: currentPrompt,
        messages: [{ role: "user", content: input }],
        tools: [{
          type: "web_search_20250305",
          name: "web_search",
          max_uses: 12,
          allowed_domains: APPROVED_DOMAINS
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
    const citations = extractCitations(data.content);
    const searchCount = countSearches(data.content);

    let citationsHtml = "";
    if (citations.length) {
      citationsHtml = `<div class="block"><div class="block-title">Verified sources used</div><p>` +
        citations.map(([url, title]) => `<a href="${url}" target="_blank">${title}</a>`).join("<br>") +
        `</p></div>`;
    }

    document.getElementById('resultContent').innerHTML = renderContent(text) + citationsHtml;
    output.style.display = 'block';
    status.innerHTML = '';
    searchLog.textContent = searchCount
      ? `${searchCount} search${searchCount === 1 ? '' : 'es'} run across approved outlets · ${citations.length} sources returned`
      : 'No web searches were triggered for this input';
    output.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (err) {
    status.innerHTML = `<span style="color:#c87070">Error: ${err.message}</span>`;
  } finally {
    btn.disabled = false;
  }
}

function renderContent(text) {
  const sections = text.split(/\n---\n/);
  return sections.map(sec => {
    sec = sec.trim();
    if (!sec) return '';
    const lines = sec.split('\n');
    let title = '', body = [];
    if (lines[0].startsWith('**') && lines[0].endsWith('**')) {
      title = lines[0].replace(/\*\*/g,'').replace(/\*/g,'').trim();
      body = lines.slice(1);
    } else {
      body = lines;
    }
    const html = body.join('\n')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/\[([^\]]+)\]\((https?[^\)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
      .replace(/\n/g,'<br>');
    return `<div class="block">${title ? `<div class="block-title">${title}</div>` : ''}<p>${html}</p></div>`;
  }).join('');
}

function copyResult() {
  const text = document.getElementById('resultContent').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelectorAll('.tool-btn')[0];
    btn.textContent = 'Copied';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

function resetTool() {
  document.getElementById('inputText').value = '';
  document.getElementById('output').style.display = 'none';
  document.getElementById('status').innerHTML = '';
  document.getElementById('searchLog').textContent = '';
  document.getElementById('inputText').focus();
}

document.getElementById('inputText').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) runResearch();
});
</script>
</body>
</html>
